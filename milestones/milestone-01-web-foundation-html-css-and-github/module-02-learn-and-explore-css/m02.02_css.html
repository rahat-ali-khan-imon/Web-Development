<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
</head>
<body>   <!-- Inline CSS ব্যবহার করা হয়েছে -->
    <h1 style="background-color: blueviolet;">My First CSS Website.</h1>
    <!-- Inline style → শুধু এই h1 element এর background -->
    <p style="color: blue;">I learning a little bit about HTML.</p>
    <!-- Inline style → শুধু এই paragraph এর text color -->
    <p>I am learning CSS today. Basic only today.</p>
    <p>I will learn JavaScript soon.</p>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
