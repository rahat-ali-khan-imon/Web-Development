<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First CSS3</title>
    <!-- Internal CSS / Embedded CSS -->
    <!-- li is selector means kake dibe color -->
    <style>
        li{  
            color: green;
            /* Selector → li means এই style সব list item (li) এ apply হবে */
            /* Text color green হবে */
        }
    </style>
</head>
<body>
    <h1 style="background-color: blue; color: chartreuse;">
        My First CSS Website.
        <!-- Inline CSS → শুধু এই h1 element এ background blue এবং text color chartreuse -->
    </h1>
    <p style="color: crimson;">
        I learned a little bit about HTML.
        <!-- Inline CSS → শুধু এই paragraph এর text color crimson -->
    </p>
    <P>
        I am learning CSS today. Basic only today.
    </P>
    <p>
        I will learn JavaScript.
    </p>
    <ul>
        <li>HTML</li>  <!-- li selector apply হবে → green text -->
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <li>Inline</li>
        <li>Internal or Embedded</li>
        <li>External</li>
    </ol>
</body>
</html>
