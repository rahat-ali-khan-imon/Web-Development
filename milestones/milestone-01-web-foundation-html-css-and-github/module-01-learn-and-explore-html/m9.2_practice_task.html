<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Task3</title>
</head>
<body>
    <h2>Unordered List Type</h2>
    <h4>by default:</h4>
    <ul>
        <li>Programming</li>
        <li>Codeforces</li>
        <li>LeetCode</li>
    </ul>
    <h4>disc:</h4>
    <ul type="disc">
        <li>Programming</li>
        <li>Codeforces</li>
        <li>LeetCode</li>
    </ul>
    <h4>circle:</h4>
    <ul type="circle">
        <li>Bangla</li>
        <li>English</li>
        <li>ICT</li>
    </ul>
    <h4>square:</h4>
    <ul type="square">
        <li>Math</li>
        <li>Physics</li>
        <li>Science</li>
    </ul>
    <h4>none:</h4>
    <ul type="none">
        <li>Python</li>
        <li>Machine Learning</li>
        <li>Statistics</li>
    </ul>
</body>
</html>
