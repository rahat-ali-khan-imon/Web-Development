<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        nav {  
            display: flex;
            justify-content: space-between; 
        }
        nav a {   
            text-decoration: none;
            font-size: 20px;
        }
        form input {                                                /**/
            display: block;
        }
        /*
        ✅ Method 1: Direct display block (Simple Way)
        এখন সব input একটার নিচে একটা চলে যাবে।
        */
    </style>
</head>
<body>
    <nav>
        <div>   
            <a href="">Home</a>
            <a href="">Profile</a>
            <a href="">Blog</a>
            <a href="">About</a>
        </div>
        <a href="">Login</a>
    </nav>
    <form action="">
        <h2>Please Login</h2>
        <input type="email" name="" id="" placeholder="Your Email">
        <input type="password" name="" id="" placeholder="Your Password">
        <input type="submit" value="Login">
    </form>
</body>
</html>
