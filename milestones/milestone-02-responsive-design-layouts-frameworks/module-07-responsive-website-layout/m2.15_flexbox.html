<!-- Sample Responsive Layout -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container {
            border: 2px solid darkgreen;   
            display: flex;                                      /**/
            height: 500px;  
        }
        .box { 
            border: 2px solid lime;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>Flexbox Layout (Responsive)</h1>
    <div class="container">
        <!-- .box{Box - $}*3 -->
         <div class="box">Box - 1</div>
         <div class="box">Box - 2</div>
         <div class="box">Box - 3</div>
    </div>
</body>
</html>
